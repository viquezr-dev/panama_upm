<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador UPM - Panamá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .control-panel {
            position: absolute; top: 15px; left: 60px; z-index: 1000;
            background: white; padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #ddd;
        }
        
        select {
            padding: 8px; width: 220px; border-radius: 4px;
            border: 1px solid #ffb347; margin-top: 5px; cursor: pointer;
        }

        .info-box {
            padding: 10px; background: rgba(255,255,255,0.95);
            box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px;
            border-left: 5px solid #ffb347; line-height: 1.5;
            min-width: 200px;
        }

        h4 { margin: 0 0 5px 0; color: #e67e22; }
    </style>
</head>
<body>

<div class="control-panel">
    <strong>Filtrar por Provincia:</strong><br>
    <select id="provinciaSelect" onchange="filtrarProvincia()">
        <option value="todos">Cargando datos...</option>
    </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Capas Base
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

    const map = L.map('map', { 
        center: [8.5, -80.0], 
        zoom: 8, 
        layers: [osm] 
    });

    // Control de capas (Calles y Satélite)
    L.control.layers({ "Calles": osm, "Satélite": satellite }, null, { collapsed: false }).addTo(map);

    let geojsonLayer;
    let datosCompletos;

    // 2. Cuadro de Información (Hover)
    const info = L.control({position: 'topright'});
    info.onAdd = function (map) {
        this._div = L.DomUtil.create('div', 'info-box');
        this.update();
        return this._div;
    };
    info.update = function (p) {
        this._div.innerHTML = '<h4>Datos de la UPM</h4>' +  (p ?
            '<b>CÓDIGO UPM:</b> ' + (p.CODIGO_UPM || 'N/A') + '<br>' +
            '<b>LUGAR POBLADO:</b> ' + (p.LUPO_NOMB || 'No definido') + '<br>' +
            '<b>PROVINCIA:</b> ' + (p.PROV_NOMB || '') + '<br>' +
            '<b>DISTRITO:</b> ' + (p.DIST_NOMB || '') :
            'Pase el mouse sobre un polígono');
    };
    info.addTo(map);

    // 3. Estilo Naranja Pastel e Interacción
    function estiloBase(feature) {
        return {
            fillColor: '#ffcc99', // Naranja pastel
            weight: 1.2,
            opacity: 1,
            color: '#e67e22',     // Borde un poco más oscuro
            fillOpacity: 0.6
        };
    }

    function mostrarCapa(data) {
        if (geojsonLayer) map.removeLayer(geojsonLayer);

        geojsonLayer = L.geoJSON(data, {
            style: estiloBase,
            onEachFeature: function(feature, layer) {
                layer.on({
                    mouseover: function(e) {
                        const l = e.target;
                        l.setStyle({ 
                            weight: 3, 
                            color: '#d35400', 
                            fillOpacity: 0.8,
                            fillColor: '#ffb347' 
                        });
                        l.bringToFront();
                        info.update(l.feature.properties);
                    },
                    mouseout: function(e) {
                        geojsonLayer.resetStyle(e.target);
                        info.update();
                    }
                });
            }
        }).addTo(map);

        if (data.features.length > 0) {
            map.fitBounds(geojsonLayer.getBounds());
        }
    }

    function poblarSelector(data) {
        const select = document.getElementById('provinciaSelect');
        const provincias = [...new Set(data.features.map(f => f.properties.PROV_NOMB))].sort();
        
        select.innerHTML = '<option value="todos">-- Todas las Provincias --</option>';
        provincias.forEach(prov => {
            if(prov) {
                const el = document.createElement('option');
                el.value = el.textContent = prov;
                select.appendChild(el);
            }
        });
    }

    function filtrarProvincia() {
        const val = document.getElementById('provinciaSelect').value;
        if (val === "todos") {
            mostrarCapa(datosCompletos);
        } else {
            const filtrados = {
                type: "FeatureCollection",
                features: datosCompletos.features.filter(f => f.properties.PROV_NOMB === val)
            };
            mostrarCapa(filtrados);
        }
    }

    // 4. Carga del archivo corregido
    fetch('upm_tot.geojson')
        .then(res => {
            if(!res.ok) throw new Error("No se pudo cargar 'upm_tot.geojson'");
            return res.json();
        })
        .then(data => {
            datosCompletos = data;
            poblarSelector(data);
            mostrarCapa(data);
        })
        .catch(err => {
            console.error(err);
            alert("Error: " + err.message);
        });

</script>
</body>
</html>
